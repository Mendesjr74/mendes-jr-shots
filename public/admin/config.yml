backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

site_url: https://mendesjrshots.netlify.app
display_url: https://mendesjrshots.netlify.app
logo_url: /favicon.svg

locale: "pt"

collections:
  - name: "config"
    label: "Configurações do site"
    editor:
      preview: false
    files:
      - name: "site"
        label: "Site"
        file: "src/content/site/site.json"
        format: "json"
        media_folder: "/public/images/site"
        public_folder: "/images/site"
        fields:
          - { label: "Seu nome", name: "nome", widget: "string", hint: "Aparece no cabeçalho e no rodapé" }
          - { label: "Tagline", name: "tagline", widget: "string", required: false, hint: "Subtítulo ao lado do nome (ex: 'Shots & Notes')" }
          - { label: "Título do hero", name: "heroTitulo", widget: "text", required: false, hint: "Frase principal da home" }
          - { label: "Subtítulo do hero", name: "heroSubtitulo", widget: "text", required: false, hint: "Parágrafo abaixo do título" }
          - { label: "Foto de destaque do hero", name: "heroDestaque", widget: "image", required: false, hint: "Foto grande que aparece na home" }
          - { label: "Legenda da foto de destaque", name: "heroDestaqueLegenda", widget: "string", required: false }
          - { label: "Sua foto (seção Sobre)", name: "fotoPerfil", widget: "image", required: false, hint: "Foto sua que aparece na seção Sobre" }
          - { label: "Bio", name: "bio", widget: "text", required: false, hint: "Texto curto sobre você na seção Sobre" }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Instagram (URL)", name: "instagram", widget: "string", required: false, hint: "Ex: https://instagram.com/seuperfil" }
          - { label: "YouTube (URL)", name: "youtube", widget: "string", required: false }
          - { label: "Behance (URL)", name: "behance", widget: "string", required: false }

  - name: "portfolio"
    label: "Portfólio"
    label_singular: "Foto"
    folder: "src/content/portfolio"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    media_folder: "/public/images/portfolio"
    public_folder: "/images/portfolio"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Local", name: "location", widget: "string", required: false }
      - { label: "Foto", name: "image", widget: "image", required: false }
      - { label: "Câmera", name: "camera", widget: "string", required: false }
      - { label: "Lente", name: "lens", widget: "string", required: false }
      - { label: "Descrição", name: "body", widget: "markdown", required: false }

  - name: "historias"
    label: "Histórias"
    label_singular: "História"
    folder: "src/content/historias"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    media_folder: "/public/images/historias"
    public_folder: "/images/historias"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Resumo", name: "excerpt", widget: "text" }
      - { label: "Capa", name: "cover", widget: "image", required: false }
      - { label: "Texto", name: "body", widget: "markdown" }

  - name: "aulas"
    label: "Aulas"
    label_singular: "Aula"
    folder: "src/content/aulas"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    media_folder: "/public/images/aulas"
    public_folder: "/images/aulas"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Resumo", name: "excerpt", widget: "text" }
      - label: "Tipo"
        name: "type"
        widget: "select"
        options:
          - { label: "Texto", value: "texto" }
          - { label: "Vídeo", value: "video" }
      - label: "Nível"
        name: "level"
        widget: "select"
        required: false
        options: ["Iniciante", "Intermediário", "Avançado", "Geral"]
      - { label: "URL do vídeo (YouTube/Vimeo)", name: "videoUrl", widget: "string", required: false }
      - { label: "Capa", name: "cover", widget: "image", required: false }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
